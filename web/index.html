<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="CampanhaMT - Gestão Eleitoral MT. Campanha eleitoral no Mato Grosso.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">

  <!-- PWA / iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CampanhaMT">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>

  <title>CampanhaMT - Gestão Eleitoral</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Maps API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDgeOvier1TIBJJd3o0ElQoMiugqrnOrCI"></script>

  <script>
    // ── Detecção de plataforma ────────────────────────────────────────────────
    window.pwaIsIOS = function() {
      return /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
    };

    window.pwaIsSafari = function() {
      const ua = navigator.userAgent.toLowerCase();
      return ua.includes('safari') && !ua.includes('chrome') && !ua.includes('chromium');
    };

    // ── PWA: captura o prompt de instalação ──────────────────────────────────
    window._pwaInstallPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window._pwaInstallPrompt = e;
      window.dispatchEvent(new CustomEvent('pwa-install-available'));
    });

    window.addEventListener('appinstalled', () => {
      window._pwaInstallPrompt = null;
      window.dispatchEvent(new CustomEvent('pwa-app-installed'));
    });

    window.pwaInstall = function() {
      if (!window._pwaInstallPrompt) return null;
      window._pwaInstallPrompt.prompt();
      window._pwaInstallPrompt = null;
      return true;
    };

    window.pwaCanInstall = function() {
      return window._pwaInstallPrompt !== null;
    };

    window.pwaIsInstalled = function() {
      return window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true;
    };

    // ── Notificações ─────────────────────────────────────────────────────────
    window.notifPermission = function() {
      return Notification.permission;
    };

    window.notifRequestPermission = function() {
      return Notification.requestPermission();
    };

    window.pushSubscribe = function(vapidPublicKey) {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        return Promise.reject('Push não suportado');
      }
      return navigator.serviceWorker.ready.then((reg) => {
        const key = _urlB64ToUint8Array(vapidPublicKey);
        return reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: key });
      }).then((sub) => JSON.stringify(sub));
    };

    window.pushUnsubscribe = function() {
      if (!('serviceWorker' in navigator)) return Promise.resolve(false);
      return navigator.serviceWorker.ready
        .then((reg) => reg.pushManager.getSubscription())
        .then((sub) => sub ? sub.unsubscribe() : false);
    };

    window.pushCurrentSubscription = function() {
      if (!('serviceWorker' in navigator)) return Promise.resolve(null);
      return navigator.serviceWorker.ready
        .then((reg) => reg.pushManager.getSubscription())
        .then((sub) => sub ? JSON.stringify(sub) : null);
    };

    window.showLocalNotification = function(title, body, url) {
      if (Notification.permission !== 'granted') return;
      const n = new Notification(title, {
        body,
        icon: '/icons/Icon-192.png',
        badge: '/icons/Icon-192.png',
      });
      if (url) n.onclick = () => { window.focus(); window.location.href = url; };
    };

    function _urlB64ToUint8Array(b64) {
      const pad = '='.repeat((4 - b64.length % 4) % 4);
      const base64 = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
      const raw = atob(base64);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    // ── Registrar service worker de push ─────────────────────────────────────
    // Registrado logo ao carregar para garantir que o SW está ativo quando
    // o app solicitar push (o SW do Flutter gerencia o cache de assets).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/push-sw.js', { scope: '/' })
          .catch(() => {
            // Falha silenciosa se o flutter_service_worker.js já ocupa o escopo.
          });
      });
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
