# Único job: build Flutter Web no GitHub e envia build/web para a Vercel.
# A Vercel não tem Flutter; o deploy é só upload dos arquivos estáticos.

name: Build e Deploy na Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.0'

      - name: Dependências
        run: flutter pub get

      - name: Build web
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          flutter build web --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Incluir vercel.json no build
        run: cp vercel.json build/web/

      - name: Deploy na Vercel
        id: vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: build/web
          vercel-args: '--prod'

      - name: URL em produção
        run: |
          echo "Site: ${{ steps.vercel.outputs.vercel-url }}"
