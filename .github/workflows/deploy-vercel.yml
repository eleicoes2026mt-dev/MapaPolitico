# Build Flutter Web e deploy dos arquivos estáticos na Vercel.

name: Build e Deploy na Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.27.1'

      - name: Dependências
        run: flutter pub get

      - name: Build web
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          # Obrigatório para links de convite (apoiador/assessor): tem de coincidir com Redirect URLs no Supabase Auth.
          # Definir o secret APP_URL em GitHub (ex.: https://meusvotos.vercel.app) ou cai no fallback abaixo.
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          BASE_URL="${APP_URL:-https://meusvotos.vercel.app}"
          flutter build web --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=APP_URL="$BASE_URL"

      - name: Versão do deploy (app oferece recarregar quando há build nova)
        run: |
          VERSION="${GITHUB_SHA:-$GITHUB_RUN_ID}"
          printf '%s\n' "{\"version\":\"$VERSION\"}" > build/web/version.json

      - name: Incluir vercel.json no build
        run: cp vercel.json build/web/

      - name: Deploy na Vercel
        id: vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          cd build/web
          npx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN" 2>&1 | tee deploy.log
          DEPLOY_URL=$(grep -oE 'https://[^[:space:]]+\.vercel\.app' deploy.log | tail -1)
          echo "vercel-url=${DEPLOY_URL:-}" >> $GITHUB_OUTPUT

      - name: URL em produção
        run: |
          echo "Site: ${{ steps.vercel.outputs.vercel-url }}"
          if [ -n "${{ steps.vercel.outputs.vercel-url }}" ]; then echo "Deploy concluído."; fi
