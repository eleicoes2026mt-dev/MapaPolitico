name: campanha_mt
description: CampanhaMT - Gestão Eleitoral MT. Campanha eleitoral no Mato Grosso.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.0
  app_links: ^6.3.2

  # Estado e navegação
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.0.0

  # UI e utilitários
  intl: ^0.19.0
  flutter_local_notifications: ^17.0.0
  url_launcher: ^6.2.4
  qr_flutter: ^4.1.0
  share_plus: ^7.2.2

  # Mapas
  google_maps_flutter: ^2.5.3
  google_maps_flutter_web: ^0.5.4+1

  # Gráficos e tabelas
  fl_chart: ^0.66.0
  data_table_2: ^2.5.15

  # Formulários e storage
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2

  # Ícones e tema
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/
